# Personal fork: build web UI + boot JAR, run JReleaser Docker package, push to GHCR.
# Requires: push this workflow to GitHub, enable Actions, use workflow_dispatch from Actions tab.
# Image: ghcr.io/<your-username>/komga:<version>-custom (and :latest)

name: Docker image (fork)

on:
  workflow_dispatch:

concurrency:
  group: docker-fork-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: komga-webui/package-lock.json

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          java-package: jdk
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set image version
        id: ver
        run: |
          VER=$(grep '^version=' gradle.properties | cut -d= -f2)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Building Komga $VER"

      - name: Build application JAR
        run: ./gradlew :komga:prepareThymeLeaf :komga:bootJar
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: JReleaser package (Docker context)
        run: ./gradlew jreleaserPackage

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./komga/build/jreleaser/package/docker
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/komga:latest
            ghcr.io/${{ github.repository_owner }}/komga:${{ steps.ver.outputs.version }}-custom
